# ──────────────────────────────────────────────────────────────────────────
# Render Blueprint — one-click provision of the Kobo API + its datastores.
#
#   Render Dashboard → New → Blueprint → pick this repo.
#
# Provisions (all free tier, Oregon):
#   • PostgreSQL (system of record)   • Key Value / Valkey (BullMQ + token lease)
#   • the Fastify API (Docker)        migrations + demo seed run on API boot.
#
# NOTE: the free Postgres instance EXPIRES ~30 days after creation. Secrets
# (JWT_SECRET, seed password) are generated by Render, not stored in the repo.
#
# The `worker` (background reconciler) and `web` (Next.js dashboard) are NOT
# defined here — Render background workers require a paid plan, and in mock
# adapter mode the API serves the dashboard flows on its own. To add them later,
# see apps/worker/Dockerfile and apps/web/Dockerfile.
# ──────────────────────────────────────────────────────────────────────────

databases:
  - name: nomba-hack-db
    databaseName: nomba_hack
    user: nomba_hack_user
    plan: free
    region: oregon

services:
  # Redis-compatible Key Value store (Valkey). Internal-only: no external ingress.
  - type: keyvalue
    name: nomba-hack-kv
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # empty = reachable only from services in this Render account

  # Fastify API. Built from the repo-root Docker context (the monorepo Dockerfile
  # copies workspace manifests, so the build context MUST be the repo root).
  - type: web
    name: nomba-api
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render routes HTTP to this port; the app binds API_PORT (0.0.0.0).
      - key: API_PORT
        value: 10000
      # Apply migrations + seed the demo operators/data on boot (free tier has
      # no one-off jobs). Idempotent — safe on every deploy.
      - key: MIGRATE_ON_BOOT
        value: "true"
      - key: SEED_ON_BOOT
        value: "true"
      # Internal connection strings from the resources above (no SSL needed on
      # Render's private network; our pg client uses SSL only if the URL asks).
      - key: DATABASE_URL
        fromDatabase:
          name: nomba-hack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nomba-hack-kv
          property: connectionString
      # Generated once by Render and injected; satisfies the 32-byte minimum.
      - key: JWT_SECRET
        generateValue: true
      # Demo login for the seeded maker@kobo.dev / checker@kobo.dev operators.
      # Fixed (not generated) because seeding is onConflictDoNothing — the first
      # seed's password sticks, so it must be a known value. Demo-only, mock
      # adapter, no real money; matches the repo's docker-compose default.
      - key: SEED_OPERATOR_PASSWORD
        value: kobo-demo-2026
      # Nomba: mock adapter for the demo — placeholders satisfy env validation.
      # Switch to real sandbox creds + NOMBA_ADAPTER=real when going live.
      - key: NOMBA_ADAPTER
        value: mock
      - key: NOMBA_CLIENT_ID
        value: placeholder
      - key: NOMBA_CLIENT_SECRET
        value: placeholder
      - key: NOMBA_SIGNATURE_KEY
        value: placeholder
      - key: NOMBA_ACCOUNT_ID
        value: 00000000-0000-0000-0000-000000000000
      # Set this to the dashboard origin once apps/web is deployed.
      - key: CORS_ORIGINS
        value: "*"
