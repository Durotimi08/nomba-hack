# ──────────────────────────────────────────────────────────────────────────
# Render Blueprint — full Kobo stack as Infrastructure-as-Code.
#
#   Render Dashboard → New → Blueprint → pick this repo.
#
# Provisions (Oregon):
#   • PostgreSQL (system of record)      • Key Value / Valkey (BullMQ + token lease)
#   • Fastify API   (web,  free)         migrations + demo seed run on API boot
#   • Next.js web   (web,  free)         operator dashboard
#   • BullMQ worker (worker, STARTER)    reconcile / payout / backfill
#
# NOTES:
#   • The free Postgres instance EXPIRES ~30 days after creation.
#   • Background workers are NOT free — the worker is set to the Starter plan
#     ($7/mo). Remove that service (and downgrade to API+web) if you want $0.
#   • Secrets here are PLACEHOLDERS (mock adapter). The live services use real
#     Nomba TEST creds set directly in each service's dashboard env (prod.env) —
#     real secrets are never committed. Names mirror the live deploy.
# ──────────────────────────────────────────────────────────────────────────

databases:
  - name: nomba-hack-db
    databaseName: nomba_hack
    user: nomba_hack_user
    plan: free
    region: oregon

services:
  # ── Key Value store (Valkey). Internal-only: no external ingress. ──────────
  - type: keyvalue
    name: nomba-hack-kv
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # empty = reachable only from services in this Render account

  # ── Fastify API ────────────────────────────────────────────────────────────
  # Built from the repo-root Docker context (the monorepo Dockerfile copies
  # workspace manifests, so the build context MUST be the repo root).
  - type: web
    name: nomba-hack
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render routes HTTP to this port; the app binds API_PORT (0.0.0.0).
      - key: API_PORT
        value: 10000
      # Apply migrations + seed the demo operators/data on boot (free tier has
      # no one-off jobs). Idempotent — safe on every deploy.
      - key: MIGRATE_ON_BOOT
        value: "true"
      - key: SEED_ON_BOOT
        value: "true"
      # Internal connection strings from the resources above (no SSL needed on
      # Render's private network; our pg client uses SSL only if the URL asks).
      - key: DATABASE_URL
        fromDatabase:
          name: nomba-hack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nomba-hack-kv
          property: connectionString
      # Generated once by Render and injected; satisfies the 32-byte minimum.
      - key: JWT_SECRET
        generateValue: true
      # Demo login for the seeded maker@kobo.dev / checker@kobo.dev operators.
      # Fixed (not generated) because seeding is onConflictDoNothing — the first
      # seed's password sticks, so it must be a known value.
      - key: SEED_OPERATOR_PASSWORD
        value: kobo-demo-2026
      # Nomba: placeholders satisfy env validation for a mock-mode blueprint.
      # The live service overrides these with real TEST creds + NOMBA_ADAPTER=real.
      - key: NOMBA_ADAPTER
        value: mock
      - key: NOMBA_CLIENT_ID
        value: placeholder
      - key: NOMBA_CLIENT_SECRET
        value: placeholder
      - key: NOMBA_SIGNATURE_KEY
        value: placeholder
      - key: NOMBA_ACCOUNT_ID
        value: 00000000-0000-0000-0000-000000000000
      # Allow the dashboard origin. The API matches origins literally, so this
      # must be the web service's exact URL (not "*") for browser calls to work.
      - key: CORS_ORIGINS
        value: https://nomba-hack-web.onrender.com

  # ── Next.js dashboard ──────────────────────────────────────────────────────
  # NEXT_PUBLIC_API_URL is inlined into the client bundle at BUILD time, so it is
  # declared as an ARG in apps/web/Dockerfile and supplied here as an env var
  # (Render forwards matching env vars to the Docker build as build args).
  - type: web
    name: nomba-hack-web
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://nomba-hack.onrender.com

  # ── BullMQ worker (reconcile / payout / backfill) ──────────────────────────
  # Background workers require a paid plan on Render. No HTTP port.
  - type: worker
    name: nomba-hack-worker
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: apps/worker/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nomba-hack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nomba-hack-kv
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Real payouts need real Nomba creds — the live worker overrides these.
      - key: NOMBA_ADAPTER
        value: mock
      - key: NOMBA_CLIENT_ID
        value: placeholder
      - key: NOMBA_CLIENT_SECRET
        value: placeholder
      - key: NOMBA_SIGNATURE_KEY
        value: placeholder
      - key: NOMBA_ACCOUNT_ID
        value: 00000000-0000-0000-0000-000000000000
