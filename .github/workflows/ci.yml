name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  integration:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    # Run only after the fast checks pass.
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The integration suite uses Testcontainers, which starts its OWN ephemeral
      # Postgres/Redis containers. No `services:` block is needed — Testcontainers
      # talks to the Docker daemon that the ubuntu-latest runner ships with.
      - name: Integration tests
        run: pnpm test:int

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api, dockerfile: apps/api/Dockerfile, target: runtime }
          - { name: worker, dockerfile: apps/worker/Dockerfile, target: runtime }
          - { name: web, dockerfile: apps/web/Dockerfile, target: runtime }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only (push: false) to verify each Dockerfile compiles.
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
